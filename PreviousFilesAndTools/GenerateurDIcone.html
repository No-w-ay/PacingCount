<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Générateur d'icônes PWA</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; background: #f4f4f4;}
        .card { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #2196F3; color: white; border: none; padding: 12px 24px; border-radius: 5px; font-weight: bold; cursor: pointer; margin: 10px; font-size: 16px; }
        button:hover { background: #1976D2; }
        canvas { border: 1px solid #ddd; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Générateur d'icônes PacingCount</h2>
        <p>Cliquez sur les boutons ci-dessous pour générer et télécharger vos images au format PNG.</p>
        
        <div>
            <button onclick="downloadIcon(192)">Télécharger icon-192.png</button>
            <button onclick="downloadIcon(512)">Télécharger icon-512.png</button>
        </div>
        
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        function downloadIcon(size) {
            const canvas = document.getElementById('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // 1. Fond blanc
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, size, size);
            
            // 2. Rond bleu
            ctx.fillStyle = '#2196F3';
            ctx.beginPath();
            // On calcule un rayon pour que le rond prenne 80% de l'image
            const radius = (size * 0.8) / 2;
            const center = size / 2;
            ctx.arc(center, center, radius, 0, 2 * Math.PI);
            ctx.fill();
            
            // 3. Déclenchement du téléchargement
            const link = document.createElement('a');
            link.download = `icon-${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
